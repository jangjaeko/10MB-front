<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10MB - 오프라인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030712;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #9ca3af; line-height: 1.6; }
    button {
      margin-top: 32px;
      padding: 12px 32px;
      border-radius: 999px;
      border: none;
      background: #f97316;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>인터넷 연결을 확인해주세요</h1>
  <p>네트워크 연결이 없어 페이지를<br />불러올 수 없어요.</p>
  <button onclick="location.reload()">다시 시도</button>
</body>
</html>
